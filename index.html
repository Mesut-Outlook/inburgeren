<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inburgeringsexamen — Oefenen 🇳🇱</title>
<link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <main id="app-root" class="app-root">
    <!-- views are rendered here by js/app.js -->
  </main>

  <footer class="app-footer">
    <p id="footer-note"></p>
  </footer>

  <!-- Core libs (order matters): i18n -> bootstrap -> store -> lezen -> woorden -->
  <script src="js/i18n.js?v=14"></script>
  <script src="js/bootstrap.js?v=2"></script>
  <script src="js/store.js?v=1"></script>
  <script src="js/lezen.js?v=2"></script>
  <script src="js/woorden.js?v=4"></script>
  <script src="js/productief.js?v=1"></script>
  <!-- Public data manifest (committed): generated exams + vocabulary sets -->
  <script src="js/data-files.js?v=7"></script>
  <!-- Loader: optional local override (gitignored real exams) -> data files -> app.js -> footer.
       Missing files (e.g. real exams on the public site) are skipped silently. -->
  <script>
    (function () {
      function loadSeq(list, done) {
        var i = 0;
        (function next() {
          if (i >= list.length) { if (done) { done(); } return; }
          var s = document.createElement("script");
          s.src = list[i++];
          s.onload = next;
          s.onerror = next; // skip files that don't exist on this deployment
          document.head.appendChild(s);
        })();
      }
      function initFooter() {
        var note = document.getElementById("footer-note");
        if (!note) { return; }
        function updateFooter() { note.textContent = INB.t("footer_note"); }
        updateFooter();
        var prevHandler = INB.onLangChange;
        INB.onLangChange = function (lang) {
          if (prevHandler) { prevHandler(lang); }
          updateFooter();
        };
      }
      // 1) try local override (adds real exams), 2) load all data files, 3) app.js, 4) footer.
      loadSeq(["js/data-files.local.js?v=2"], function () {
        var files = (INB.dataFiles || []).slice();
        files.push("js/app.js?v=10");
        loadSeq(files, initFooter);
      });
    })();
  </script>
</body>
</html>
